<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monetag Bot Premium - Super Fast</title>
    
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Monetag SDK -->
    <script src='//libtl.com/sdk.js' data-zone='10878359' data-sdk='show_10878359'></script>

    <style>
        :root {
            --primary-bg: #f8faff;
            --purple-main: #6c5ce7;
            --dark-card: #1a1c2c;
            --text-dark: #2d3436;
            --text-gray: #636e72;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: linear-gradient(180deg, #d4d9ff 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-card {
            background: #ffffff;
            width: 100%;
            max-width: 380px;
            border-radius: 45px;
            padding: 40px 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.06);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.8);
        }

        /* Status Badge */
        .status-pill {
            background: #1a1c2c;
            color: #fff;
            padding: 8px 18px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            font-size: 13px;
            gap: 8px;
            margin-bottom: 25px;
        }

        .dot { width: 8px; height: 8px; background: #ff7675; border-radius: 50%; }
        .dot.active { background: #e056fd; box-shadow: 0 0 10px #e056fd; animation: blink 0.8s infinite; }

        @keyframes blink { 50% { opacity: 0.2; } }

        .premium-badge {
            background: #fff9e6;
            color: #f1c40f;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            border: 1px solid #fcebb6;
            margin-bottom: 15px;
            display: inline-block;
        }

        h1 { font-size: 32px; color: var(--text-dark); font-weight: 800; letter-spacing: -1px; }
        h1 span { color: var(--purple-main); }
        .subtitle { color: var(--text-gray); font-size: 14px; margin-bottom: 30px; }

        .points-display {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 25px;
            color: var(--text-dark);
            background: #f1f3ff;
            padding: 15px;
            border-radius: 20px;
            display: inline-block;
            width: 100%;
        }

        /* Feature Card */
        .card {
            background: #fff;
            border: 1px solid #f1f2f6;
            border-radius: 24px;
            padding: 20px;
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            text-align: left;
        }

        .card:active { transform: scale(0.97); }

        .icon-box {
            width: 48px;
            height: 48px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 20px;
        }

        .card-info h4 { font-size: 16px; color: var(--text-dark); font-weight: 700; }
        .card-info p { font-size: 12px; color: var(--text-gray); }

        /* Dark Start Card */
        .card-dark {
            background: var(--dark-card);
            border: none;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .card-dark h4 { color: white; }
        .card-dark p { color: #a4b0be; }

        /* Progress Bar Animation (Fast) */
        .loader-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: #00d2d3;
            width: 0%;
            display: none;
        }

        .divider {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ced4da;
            margin: 20px 0;
            font-weight: 700;
        }

        .btn-support {
            background: white;
            border: 1px solid #f1f2f6;
            border-radius: 20px;
            padding: 16px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 700;
            color: var(--text-dark);
            text-decoration: none;
            margin-top: 10px;
        }

        .footer-nr {
            margin-top: 35px;
            font-size: 11px;
            color: #b2bec3;
            letter-spacing: 4px;
            font-weight: 700;
        }

        .disabled { pointer-events: none; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="app-card">
        <div class="status-pill">
            <span class="dot" id="botDot"></span>
            <span id="botText">Bot Ready</span>
        </div>
        <br>
        <div class="premium-badge">
            <i class="fa-solid fa-crown"></i> PREMIUM V2.1
        </div>

        <h1>Monetag <span>Bot</span></h1>
        <p class="subtitle">Maximize your earnings with auto-loop.</p>

        <div class="points-display">
            <span style="font-size: 12px; color: #6c5ce7; display: block; text-transform: uppercase;">Current Points</span>
            <span id="ptCount">0.0</span>
        </div>

        <!-- Manual Watch -->
        <div class="card" onclick="triggerManualAd()">
            <div class="icon-box" style="background: #eef2ff; color: #4834d4;">
                <i class="fa-solid fa-eye"></i>
            </div>
            <div class="card-info" style="flex: 1;">
                <h4>Watch Ad</h4>
                <p>Manual Boost</p>
            </div>
            <i class="fa-solid fa-chevron-right" style="color: #dfe6e9; font-size: 12px;"></i>
        </div>

        <div class="divider">Automation</div>

        <!-- Auto Loop Start -->
        <div class="card card-dark" id="startBtn" onclick="initiateAutoLoop()">
            <div class="icon-box" style="background: rgba(255,255,255,0.1); color: #e056fd;">
                <i class="fa-solid fa-bolt-lightning"></i>
            </div>
            <div class="card-info" style="flex: 1;">
                <h4>Start Auto Loop</h4>
                <p id="loopStatus">Speed: 1.0s Loop</p>
            </div>
            <div id="liveSignal" style="width: 10px; height: 10px; background: #2ecc71; border-radius: 50%; display: none; box-shadow: 0 0 8px #2ecc71;"></div>
            <div class="loader-bar" id="progressBar"></div>
        </div>

        <!-- Stop Button -->
        <div class="card" id="stopBtn" onclick="terminateLoop()" style="background: #fff1f1; border: none; opacity: 0.5;">
            <div class="icon-box" style="background: #ffe3e3; color: #eb4d4b;">
                <i class="fa-solid fa-power-off"></i>
            </div>
            <div class="card-info">
                <h4>Stop System</h4>
            </div>
        </div>

        <a href="#" class="btn-support">
            <i class="fa-brands fa-telegram" style="color: #0088cc; font-size: 20px;"></i>
            Support & Updates
        </a>

        <div class="footer-nr">DESIGNED BY NR</div>
    </div>

    <script>
        let totalPoints = parseFloat(localStorage.getItem('nr_points')) || 0.0;
        let isRunning = false;
        const SPEED_MS = 1000; // ১ সেকেন্ড স্পিড

        document.getElementById('ptCount').innerText = totalPoints.toFixed(1);

        function updatePoints(val) {
            totalPoints += val;
            document.getElementById('ptCount').innerText = totalPoints.toFixed(1);
            localStorage.setItem('nr_points', totalPoints);
        }

        function triggerManualAd() {
            if (typeof show_10878359 === 'function') {
                show_10878359().then(() => updatePoints(0.5));
            }
        }

        function initiateAutoLoop() {
            if (isRunning) return;
            isRunning = true;

            // UI Changes
            document.getElementById('botDot').classList.add('active');
            document.getElementById('botText').innerText = "Bot Running";
            document.getElementById('startBtn').classList.add('disabled');
            document.getElementById('stopBtn').style.opacity = "1";
            document.getElementById('liveSignal').style.display = "block";
            document.getElementById('progressBar').style.display = "block";

            autoAdCycle();
        }

        async function autoAdCycle() {
            if (!isRunning) return;

            document.getElementById('loopStatus').innerText = "Requesting Ad...";
            
            try {
                if (typeof show_10878359 === 'function') {
                    await show_10878359();
                    updatePoints(0.5);
                } else {
                    await new Promise(r => setTimeout(r, 1000));
                    updatePoints(0.5);
                }
            } catch (e) { console.log("Ad Error"); }

            if (!isRunning) return;
            
            // ১ সেকেন্ড ফাস্ট লোড
            document.getElementById('loopStatus').innerText = "Restarting in 1s...";
            animateProgressBar(SPEED_MS);
            
            setTimeout(() => {
                if (isRunning) autoAdCycle();
            }, SPEED_MS);
        }

        function animateProgressBar(ms) {
            let bar = document.getElementById('progressBar');
            bar.style.transition = 'none';
            bar.style.width = '0%';
            setTimeout(() => {
                bar.style.transition = `width ${ms}ms linear`;
                bar.style.width = '100%';
            }, 20);
        }

        function terminateLoop() {
            isRunning = false;
            document.getElementById('botDot').classList.remove('active');
            document.getElementById('botText').innerText = "Bot Ready";
            document.getElementById('startBtn').classList.remove('disabled');
            document.getElementById('stopBtn').style.opacity = "0.5";
            document.getElementById('liveSignal').style.display = "none";
            document.getElementById('progressBar').style.display = "none";
            document.getElementById('loopStatus').innerText = "Speed: 1.0s Loop";
            alert("Automation Stopped!");
        }
    </script>
</body>
</html>
